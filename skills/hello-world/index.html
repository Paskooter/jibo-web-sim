<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Hello World — Jibo skill</title>
  <style>
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
    body { width: 1280px; height: 720px; }
    #face { width: 1280px; height: 720px; }
  </style>
</head>
<body>
  <!-- jibo.init('face', …) renders the eye into this element. -->
  <div id="face"></div>
  <!-- The platform's in-place loader provides the `jibo` global + `require`,
       then runs this bundle's entry — exactly as an original Jibo bundle. -->
  <script src="index.js"></script>
</body>
</html>
