<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>synthesis: animation-utilities DOFs -> real PixiJS eye</title>
  <style>
    html, body { margin: 0; background: #111; }
    #face { width: 1280px; height: 720px; transform-origin: top left; }
    #log { position: fixed; right: 0; top: 0; width: 360px; height: 100%; overflow: auto;
           font: 11px monospace; color: #9f9; background: #000c; padding: 6px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div id="face"></div>
  <pre id="log"></pre>
  <script type="module">
    import { createRequire } from '/src/skill-runtime/cjs-require.js';
    const logEl = document.getElementById('log');
    const L = (...a) => { logEl.textContent += a.map(x => x instanceof Error ? `${x.message}\n${x.stack}` : String(x)).join(' ') + '\n'; console.log('[synth]', ...a); };
    window.addEventListener('error', (e) => L('window.error:', e.message));
    window.addEventListener('unhandledrejection', (e) => L('unhandledrejection:', e.reason && (e.reason.stack || e.reason.message || e.reason)));

    const DIR = '/external-skills/jibo-be';
    window.__SKILL_DIR__ = DIR;
    window.__JIBO_ELECTRON__ = true;
    const req = createRequire(null)(DIR);
    window.require = req; window.module = { exports: {} }; window.exports = window.module.exports;
    window.global = window; window.process = req('process');
    window.Buffer = window.Buffer || req('buffer').Buffer;
    window.PIXI = req('pixi.js');

    const face = document.getElementById('face');
    face.style.transform = `scale(${Math.min((innerWidth - 380) / 1280, innerHeight / 720)})`;

    // 1) Boot the real jibo runtime (for its PixiJS FaceRenderer + eye).
    let jibo, anim, robotInfo;
    try {
      jibo = req('/external-skills/jibo-be/node_modules/jibo/lib/jibo.js');
      L('real jibo loaded. face?', !!jibo.face);
    } catch (e) { L('jibo load failed:', e); }

    // 2) Load animation-utilities (separate) to compute DOFs.
    try {
      anim = req('animation-utilities');
      L('animation-utilities loaded.');
    } catch (e) { L('anim load failed:', e); }

    function mountEye() {
      face.appendChild(jibo.face.view);
      jibo.face.eye.init();
      jibo.face.paused = false;
      // FaceRenderer.update (which renders the stage) fires on jibo.timer 'update';
      // jibo.init normally starts it, but we skipped init.
      try { jibo.timer.start(); L('timer started'); } catch (e) { L('timer.start failed:', e.message); }
      setTimeout(() => {
        const eye = jibo.face.eye;
        jibo.face.stage.addChild(eye);
        eye.active = true;
        L('eye mounted + active. children=', eye.children.length);
        startFeeding();
      }, 1500);
    }

    // Linear-interpolate a .anim channel set at time t (seconds).
    function sampleAnim(animJson, t) {
      const out = {};
      for (const ch of animJson.content.channels) {
        const times = ch.times; const values = ch.values;
        let v;
        if (t <= times[0]) v = values[0];
        else if (t >= times[times.length - 1]) v = values[values.length - 1];
        else {
          for (let i = 0; i < times.length - 1; i += 1) {
            if (t >= times[i] && t <= times[i + 1]) {
              const f = (t - times[i]) / (times[i + 1] - times[i]);
              v = values[i] + f * (values[i + 1] - values[i]);
              break;
            }
          }
        }
        out[ch.dofName] = v;
      }
      return out;
    }

    async function startFeeding() {
      const base = `${location.origin}${DIR}/node_modules/animation-utilities/res/geometry-config/`;
      const config = new anim.JiboConfig(base);
      const defaultAnim = await fetch(`${base}P1.0/jibo_default.anim`).then((r) => r.json());
      L('jibo_default.anim channels:', defaultAnim.content.channels.length);
      anim.RobotInfo.createInfo(config, (ri) => {
        if (!ri) { L('robotInfo null'); return; }
        robotInfo = ri;
        const baseDofs = ri.getDefaultDOFValues();
        const idle = sampleAnim(defaultAnim, 0);
        L('idle eyeTextureInfixBn_r=', idle.eyeTextureInfixBn_r, ' eyeVisibilityBn_r=', idle.eyeVisibilityBn_r);
        const dofs = Object.assign({}, baseDofs, idle);
        // The robot's expression service maps numeric texture-infix DOFs to path
        // strings before streaming; the renderer's LightFilter/Eye expect strings.
        // Use the default texture paths so the iconic default eye renders.
        const tdir = `${base}P1.0/textures/`;
        dofs.eyeTextureInfixBn_r = `${tdir}Default_Eye.png`;
        dofs.overlayTextureInfixBn_r = `${tdir}JiBO_eye_customizer_44.png`;
        dofs.screenBGTextureInfixBn_r = `${tdir}JiBO_BG_00.png`;
        let n = 0;
        const tick = () => {
          n += 1;
          try {
            jibo.face.eye.display(performance.now(), dofs, { sourceTimes: {} });
            jibo.face.render(jibo.face.stage);
          } catch (e) { if (n < 3) L('eye.display/render threw:', e.message); }
          if (n <= 4) L(`fed idle DOFs t=${n}`);
          if (n < 600) requestAnimationFrame(tick);
        };
        tick();
      });
    }

    if (jibo && jibo.face && anim) setTimeout(mountEye, 300);
    else L('prereqs missing');
  </script>
</body>
</html>
