<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>real jibo face experiment</title>
  <style>
    html, body { margin: 0; background: #111; }
    #face { width: 1280px; height: 720px; transform-origin: top left; }
    #log { position: fixed; right: 0; top: 0; width: 360px; height: 100%; overflow: auto;
           font: 11px monospace; color: #9f9; background: #000c; padding: 6px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div id="face"></div>
  <pre id="log"></pre>
  <script type="module">
    import { createRequire } from '/src/skill-runtime/cjs-require.js';

    const logEl = document.getElementById('log');
    const L = (...a) => {
      const s = a.map((x) => (x instanceof Error ? `${x.message}\n${x.stack}` : typeof x === 'object' ? safe(x) : String(x))).join(' ');
      logEl.textContent += s + '\n';
      console.log('[realface]', ...a);
    };
    const safe = (o) => { try { return JSON.stringify(o); } catch { return String(o); } };
    window.addEventListener('error', (e) => L('window.error:', e.message));
    window.addEventListener('unhandledrejection', (e) => L('unhandledrejection:', e.reason && (e.reason.stack || e.reason.message || e.reason)));

    const DIR = '/external-skills/jibo-be';
    window.__SKILL_DIR__ = DIR;
    window.__JIBO_ELECTRON__ = true;        // make the real Runtime take its render path

    const req = createRequire(null)(DIR);
    window.require = req;
    window.module = { exports: {} };
    window.exports = window.module.exports;
    window.global = window;
    window.Buffer = window.Buffer || req('buffer').Buffer;
    window.process = req('process');

    try {
      const PIXI = req('pixi.js');
      window.PIXI = PIXI;
      L('PIXI version:', PIXI && PIXI.VERSION);
    } catch (e) { L('PIXI load failed:', e); }

    let jibo;
    try {
      // Load the REAL bundled runtime by absolute path (bypassing the 'jibo' shim).
      jibo = req('/external-skills/jibo-be/node_modules/jibo/lib/jibo.js');
      window.jibo = jibo;
      L('real jibo loaded. keys:', Object.keys(jibo).join(','));
      L('has face/loader/expression/animDB/rendering:',
        !!jibo.face, !!jibo.loader, !!jibo.expression, !!jibo.animDB, !!jibo.rendering);
    } catch (e) { L('real jibo load FAILED:', e); }

    const face = document.getElementById('face');
    // Scale 1280x720 down to fit the left area.
    face.style.transform = `scale(${Math.min((innerWidth - 380) / 1280, innerHeight / 720)})`;

    const mode = new URLSearchParams(location.search).get('mode') || 'manual';

    if (jibo && mode === 'eyemount') {
      // Bring up the real FaceRenderer, then mount the real EyeContainer directly
      // on the render stage and activate it (applies the default eye texture/mesh).
      setTimeout(() => {
        try {
          face.appendChild(jibo.face.view);
          jibo.face.eye.init();
          jibo.face.paused = false;
          L('eye.init done; waiting for textures…');
          setTimeout(() => {
            const eye = jibo.face.eye;
            jibo.face.stage.addChild(eye);
            eye.active = true;
            L('mounted eye on stage + active=true. eye.visible=', eye.visible, ' children=', eye.children.length);
          }, 2000);
        } catch (e) { L('eyemount threw:', e); }
      }, 300);
    }

    if (jibo && (mode === 'manual' || mode === 'norender' || mode === 'eyeonly')) {
      // Bypass the plugin chain: bring the real FaceRenderer up directly to
      // validate WebGL + eye-texture loading in isolation. Deferred so earlier
      // logs flush before any synchronous stall.
      setTimeout(() => {
        L('MANUAL face bringup. plugins:', (jibo.plugins || []).map((p) => p.id).join(','));
        try {
          const view = jibo.face.view;
          L('appendChild view…'); face.appendChild(view);
          if (mode !== 'eyeonly') { L('views.init…'); jibo.face.views.init(null, false); }
          L('eye.init…'); jibo.face.eye.init();
          if (mode !== 'norender') { L('unpause…'); jibo.face.paused = false; }
          L('bringup done. canvas?', !!face.querySelector('canvas'));
        } catch (e) { L('manual bringup threw:', e); }
      }, 300);
    }

    if (jibo && mode === 'init') {
      // Diagnose which plugin's init never calls back.
      const started = new Set(); const finished = new Set();
      (jibo.plugins || []).forEach((p) => {
        const inst = p.instance;
        if (!inst || typeof inst.init !== 'function' || inst.__wrapped) return;
        inst.__wrapped = true;
        const orig = inst.init.bind(inst);
        inst.init = (cb) => { started.add(p.id); L(`plugin init START: ${p.id}`); orig((err, api) => { finished.add(p.id); L(`plugin init DONE:  ${p.id}${err ? ' ERR ' + err : ''}`); cb && cb(err, api); }); };
      });
      // UNIT_TESTS run mode makes the robot-service plugins skip cleanly offline.
      window.process.env.RUNMODE = 'UNIT_TESTS';
      L('runMode=', jibo.runMode, ' calling jibo.init(display, cb)…');
      try { jibo.init({ display: face }, (err) => L('init callback:', err ? `ERR ${err}` : 'OK')); }
      catch (e) { L('jibo.init threw:', e); }
      setTimeout(() => {
        const hung = [...started].filter((id) => !finished.has(id));
        L('HUNG plugins (started, never finished):', hung.join(',') || '(none)');
      }, 12000);
    }

    if (jibo) {
      let n = 0;
      const iv = setInterval(() => {
        n += 1;
        const canvas = face.querySelector('canvas');
        L(`t=${n}s faceChildren=${face.childElementCount} canvas=${!!canvas}` + (jibo.face ? ` paused=${jibo.face.paused}` : ''));
        if (n >= 16) clearInterval(iv);
      }, 1000);
    }
  </script>
</body>
</html>
